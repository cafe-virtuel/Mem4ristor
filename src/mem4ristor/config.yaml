# Mem4ristor V4.0.0 Default Configuration
# Standard Dynamics Parameters
#
# NOTE pour les scripts experiments/ :
#   dt, N, steps sont souvent hardcodes dans les scripts pour la reproductibilite
#   des experiences specifiques (reviewer2_*, demo_*). Les valeurs de reference
#   sont ici (dynamics.dt = 0.05, valide stable via dt_sensitivity.py).
#   Pour les nouveaux scripts, lire via cfg['dynamics']['dt'] est preferable.
dynamics:
  a: 0.7
  b: 0.8
  epsilon: 0.08
  alpha: 0.15
  v_cubic_divisor: 5.0
  dt: 0.05  # Pas d'integration valide (|1+lambda*dt| <= 1 confirme, voir reviewer2_stiffness_proof.py)
  # V3: Inhibition Plasticity Parameters
  lambda_intrinsic: 0.05       # Intrinsic plasticity learning rate (Reviewer 2 Vague 2 fix)
  tau_plasticity: 1000     # Forgetting time constant (steps)
  w_saturation: 2.0        # Maximum plasticity range

# Coupling Parameters
coupling:
  D: 0.15
  heretic_ratio: 0.15
  uniform_placement: true

# Doubt Dynamics (Constitutional Doubt)
doubt:
  epsilon_u: 0.02
  k_u: 1.0
  sigma_baseline: 0.05
  u_clamp: [0.0, 1.0]
  tau_u: 10.0

# Noise Parameters
noise:
  sigma_v: 0.05
  use_rtn: false
  rtn_amplitude: 0.1
  rtn_p_flip: 0.01

# V5: Non-Local Coupling by Doubt Similarity
# A chaque step, chaque noeud recoit un signal supplementaire de tous les autres
# noeuds, pondere par leur similarite de doute (noyau gaussien en u-espace) :
#   poids_ij  = exp( -(u_i - u_j)^2 / sigma_u^2 )
#   I_virtual = D_meta * ( W_norm @ v - v )   [W_norm = poids normalises par ligne]
# sigma_u petit -> seuls les noeuds tres proches en doute se voient (communautes serrees)
# sigma_u grand -> tous les noeuds se voient (champ moyen global)
# D_meta=0 reproduit exactement V4 (backward compatible)
nonlocal_coupling:
  enabled: false
  D_meta:  0.05   # Force du couplage virtuel (commence faible vs D=0.15 physique)
  sigma_u: 0.10   # Rayon de similarite en u-espace (0.10 = communautes serrees)

# V5: Metacognitive Plasticity
# epsilon_i = epsilon * (1 + alpha_meta * (0.5 - u_i))
#
# RESULTAT EXPERIMENTAL (2026-05-04, p2_meta_pistes.py) :
#   alpha_meta NEGATIF est la bonne direction :
#     u eleve (douteux) -> epsilon_i augmente -> noeud plus reactif/"emballe"
#     u faible (certain) -> epsilon_i reduit  -> noeud plus lent/stable
#   Gain mesure : +0.79 bits sur 10x10 a I_stim=0.5 (4.03 -> 4.82 bits)
#
#   alpha_meta POSITIF (douteux=lent) fonctionne aussi mais seulement a I_stim=0
#   et donne un gain moindre (+0.28 bits).
#
# alpha_meta=0 reproduit exactement le comportement V4 (backward compatible)
metacognitive:
  enabled: false           # false par defaut : backward compatible V4
  alpha_meta: -0.5         # Valeur recommandee (negative = douteux plus reactif)
  epsilon_min: 0.01        # Plancher de securite (evite epsilon <= 0)

# V5: Compartimentalisation Dynamique (Sous-Personnalites)
# Les noeuds sont partitionnes dynamiquement en K groupes selon leur rang de doute u.
# Groupe 0 = les N/K noeuds les plus certains (u faible)
# Groupe K-1 = les N/K noeuds les plus douteux (u eleve)
#
# A chaque step, un terme I_comp est ajoute :
#   mode='attraction' : chaque noeud est attire vers la moyenne de son groupe
#     I_comp_i = gamma * (mean_v_groupe_i - v_i)
#   mode='full'       : attraction intra-groupe + repulsion inter-groupe
#     I_comp_i = gamma * (mean_v_groupe_i - v_i) - gamma * (mean_v_autres - v_i)
#
# Effet attendu : les groupes se specialisent en etats distincts -> sous-personnalites
# gamma=0 reproduit exactement V4 (backward compatible)
compartments:
  enabled: false
  K:     2        # Nombre de sous-personnalites (2=certain/douteux, 3=bas/moyen/haut)
  gamma: 0.10     # Force de la compartimentation (vs D=0.15 physique)
  mode:  attraction  # 'attraction' (intra seul) ou 'full' (intra+inter)
